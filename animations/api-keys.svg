<svg xmlns="http://www.w3.org/2000/svg" width="340" height="340" viewBox="-42 -42 235 235" fill="none">
  <!-- rotating ring system: outer circle, inner dashed circle, and the two cross lines.
       One rigid rotation about the center keeps every element concentric / aligned at the edges. -->
  <g>
    <circle cx="75.5" cy="75.5" r="75" stroke="#111" stroke-miterlimit="10"/>
    <circle cx="75.5" cy="75.5" r="49.333" stroke="#111" stroke-miterlimit="10" stroke-dasharray="3 3"/>
    <line x1="75.5" y1="0.5" x2="75.5" y2="150.5" stroke="#111" stroke-miterlimit="10" stroke-dasharray="3 3"/>
    <line x1="0.5" y1="75.5" x2="150.5" y2="75.5" stroke="#111" stroke-miterlimit="10" stroke-dasharray="3 3"/>
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 75.5 75.5" to="360 75.5 75.5" dur="18s" repeatCount="indefinite"/>
  </g>
  <!-- static diamond in the middle (does not move) -->
  <rect x="54.85" y="54.85" width="41.3" height="41.3" stroke="#111" stroke-miterlimit="10" transform="rotate(45 75.5 75.5)"/>
</svg>
