<svg class="p2-mesh" height="160" viewBox="0 0 151 135.806" fill="none" xmlns="http://www.w3.org/2000/svg"><style>.p2-glyph{color:var(--text);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-bottom:4px}.p2-glyph svg{display:block;width:auto;overflow:visible;transform-box:fill-box;transform-origin:center center}@keyframes p2-spin{to{transform:rotate(360deg)}}@keyframes p2-dash{to{stroke-dashoffset:-8}}.p2-spin{animation:p2-spin 60s linear infinite}.p2-spin-rev{animation:p2-spin 72s linear infinite reverse}.p2-march .dm{animation:p2-dash 1.6s linear infinite}.p2-mesh .dm{animation:p2-dash 1.6s linear infinite}@keyframes p2-node-fill{0%,10%{fill:#111}16%,100%{fill:#fff}}.p2-mesh .p2-node{animation:p2-node-fill 4.5s linear infinite}@keyframes p2-blink{0%,30%{fill:#111}48%,100%{fill:#fff}}.p2-mesh .p2-center{animation:p2-blink 1.5s linear infinite}.p2-diamond .dm{animation:p2-dash 1.6s linear infinite}.p2-discs .dm{animation:p2-dash 1.6s linear infinite}@keyframes p2-disc-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}.p2-discs .p2-disc{animation:p2-disc-bob 3.6s ease-in-out infinite}.p2-spin-rev .dm{animation:p2-dash 1.6s linear infinite}@keyframes p2-ray{0%,100%{opacity:.22}50%{opacity:1}}.p2-burst g.p2-spin{transform-box:fill-box;transform-origin:center center}.p2-burst g.p2-spin path{animation:p2-ray 2.8s ease-in-out infinite}@keyframes p2-ring-glow{0%,100%{opacity:.4}50%{opacity:1}}@keyframes p2-flow{to{stroke-dashoffset:-1}}@keyframes p2-flow-r{to{stroke-dashoffset:1}}.p2-glyph svg.p2-march{overflow:hidden}@keyframes p2-log-step{0%,58%{transform:translateY(0)}88%,100%{transform:translateY(32px)}}@keyframes p2-log-out{0%,58%{opacity:1}82%,100%{opacity:0}}@keyframes p2-log-in{0%,64%{opacity:0}88%,100%{opacity:1}}.p2-log-stack{animation:p2-log-step 2.2s ease-in-out infinite;animation-delay:-1.25s}.p2-log-out{animation:p2-log-out 2.2s linear infinite;animation-delay:-1.25s}.p2-log-in{opacity:0;animation:p2-log-in 2.2s linear infinite;animation-delay:-1.25s}
.p2-title{font-size:44px;font-weight:400;font-family:var(--font-heading);color:var(--text);letter-spacing:-1.2px;line-height:110%;margin:0;white-space:nowrap}
.p2-desc{font-size:14px;color:var(--muted);font-family:var(--font-body);line-height:160%;margin:0;max-width:520px}
.p2-ctas{display:flex;align-items:center;gap:18px;margin-top:6px}
.p2-docs{font-size:13px;color:var(--muted);text-decoration:underline;text-underline-offset:3px;font-family:var(--font-body);transition:color .15s ease}
.p2-docs:hover{color:var(--text)}</style>
